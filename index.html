<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Compass</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--surface:#0f172a;--surface2:#131f35;--border:#1e293b;
  --text:#f1f5f9;--muted:#64748b;--subtle:#94a3b8;
  --green:#6EE7B7;--blue:#93C5FD;--red:#FCA5A5;--yellow:#FCD34D;--purple:#C4B5FD;
}
body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);padding:40px 20px}
.wrap{max-width:720px;margin:0 auto}
/* Header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:48px}
.logo-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px}
.logo-text{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.nav-pills{margin-left:auto;display:flex;gap:6px}
.nav-pill{padding:6px 12px;background:none;border:1px solid transparent;border-radius:8px;color:var(--muted);cursor:pointer;font-size:16px;transition:all .15s}
.nav-pill.active{background:var(--surface);border-color:var(--border);color:var(--text)}
/* Home */
.home-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--green);text-transform:uppercase;margin-bottom:16px}
h1{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,58px);font-weight:900;line-height:1.1;margin-bottom:20px}
.gradient{background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:18px;color:var(--muted);line-height:1.7;max-width:520px;margin-bottom:48px}
.tool-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:640px){.tool-cards{grid-template-columns:1fr}}
.tool-card{display:flex;flex-direction:column;align-items:flex-start;gap:14px;padding:24px 20px;background:var(--surface);border:1px solid var(--border);border-radius:16px;cursor:pointer;text-align:left;transition:all .2s ease;width:100%;height:100%}
.tool-card:hover{background:rgba(147,197,253,.04)}
.tool-icon{font-size:40px}
.tool-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:6px}
.tool-sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:10px;flex:1}
.tool-cta{font-size:12px;font-family:'DM Mono',monospace}
/* Shared */
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;margin-bottom:32px;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--subtle)}
.tag{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.15em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);color:var(--text);margin:12px 0 8px}
.section-sub{color:var(--muted);font-size:15px;font-family:'DM Sans',sans-serif;margin-bottom:32px}
/* Search input */
.search-input{width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:20px}
.search-input:focus{border-color:rgba(147,197,253,.5)}
/* Category pills */
.cat-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.cat-pill{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;font-size:13px;font-family:'DM Mono',monospace;transition:all .15s}
.cat-pill.active{background:rgba(147,197,253,.13);border-color:var(--blue);color:var(--blue)}
/* Major list */
.major-list{display:flex;flex-direction:column;gap:8px}
.major-btn{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;width:100%;transition:all .15s}
.major-btn:hover{border-color:rgba(147,197,253,.4);background:rgba(147,197,253,.04)}
.major-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.major-cat{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
/* Career cards */
.career-cards{display:flex;flex-direction:column;gap:20px}
.career-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
.career-card.visible{opacity:1;transform:translateY(0)}
.career-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.career-title-wrap{display:flex;align-items:center;gap:12px}
.career-emoji{font-size:36px}
.career-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);line-height:1.2}
.career-earnings{font-size:13px;color:var(--green);font-family:'DM Mono',monospace;font-weight:600;margin-top:4px}
.ai-badge{font-size:12px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px;white-space:nowrap}
.career-desc{color:var(--subtle);font-size:14px;line-height:1.6;margin-bottom:16px}
.work-profile{background:var(--bg);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.work-profile-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stat-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.stat-dots{display:flex;gap:3px}
.stat-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
.sec-label{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.sec-text{color:#cbd5e1;font-size:13px;line-height:1.6;font-family:'DM Sans',sans-serif;margin-bottom:12px}
.org-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.org-tag{font-size:12px;color:var(--blue);background:rgba(147,197,253,.1);padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace}
.courses-list{display:flex;flex-direction:column;gap:6px}
.course-item{display:flex;gap:8px;background:var(--bg);padding:8px 12px;border-radius:8px;border:1px solid var(--border)}
.course-arrow{color:var(--green);font-size:12px;flex-shrink:0;margin-top:1px}
.course-name{font-weight:600;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif}
.course-why{font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif}
/* Skeleton */
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.skel{background:var(--border);border-radius:6px;animation:pulse 1.5s ease infinite}
.close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
/* Progress bar */
.progress-wrap{margin-bottom:32px}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:2px;transition:width .5s ease;width:0%}
/* Quiz */
.quiz-layer-tag{margin-bottom:10px}
.quiz-q{font-family:'Playfair Display',serif;font-size:clamp(20px,3.5vw,30px);font-weight:700;color:var(--text);line-height:1.3;margin-bottom:10px}
.quiz-sub{color:var(--muted);font-size:15px;margin-bottom:28px}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--surface);border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;transition:all .15s ease;width:100%}
.opt-icon{font-size:24px;flex-shrink:0}
.opt-label{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.opt-desc{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);margin-top:2px}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
.quiz-nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:13px}
.quiz-nav-btn:hover{color:var(--subtle)}
/* Results summary */
.results-summary{color:var(--subtle);font-size:16px;line-height:1.7;background:var(--surface);padding:20px 24px;border-radius:14px;border-left:3px solid var(--green);margin-bottom:40px}
.results-section-label{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
/* Explore */
.search-wrap{position:relative;margin-bottom:24px}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-top:4px;z-index:10;overflow:hidden}
.search-dd-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);cursor:pointer;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:14px;transition:background .1s}
.search-dd-item:hover{background:rgba(196,181,253,.1)}
.search-dd-item:last-child{border-bottom:none}
.dd-add{color:var(--purple);font-size:12px;font-family:'DM Mono',monospace}
.compare-pills{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.compare-pill{display:flex;align-items:center;gap:6px;background:rgba(196,181,253,.1);border:1px solid rgba(196,181,253,.3);border-radius:20px;padding:4px 10px}
.compare-pill-name{font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif}
.compare-pill-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1}
.view-toggle{display:flex;gap:8px;margin-bottom:24px}
.view-btn{padding:8px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px;font-family:'DM Mono',monospace;transition:all .15s}
.view-btn.active{background:rgba(196,181,253,.13);border-color:var(--purple);color:var(--purple)}
.compare-grid{display:grid;gap:12px;overflow-x:auto}
.compare-col{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative}
.compare-col-emoji{font-size:28px;margin-bottom:6px}
.compare-col-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);line-height:1.2;margin-bottom:4px}
.compare-col-earnings{font-size:13px;color:var(--green);font-family:'DM Mono',monospace;font-weight:600;margin-bottom:8px}
.compare-col-ai{font-size:12px;font-family:'DM Mono',monospace;margin-bottom:12px}
.compare-stat-section{background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.compare-mini-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px}
.compare-mobility{font-size:12px;color:var(--muted);line-height:1.5;font-family:'DM Sans',sans-serif;margin-bottom:8px}
.org-tags-sm{display:flex;flex-wrap:wrap;gap:4px}
.org-tag-sm{font-size:10px;color:var(--blue);background:rgba(147,197,253,.1);padding:2px 6px;border-radius:12px;font-family:'DM Mono',monospace}
/* Loading/empty states */
.loading-center{text-align:center;padding:60px 0}
.loading-icon{font-size:48px;display:inline-block;animation:spin 2s linear infinite;margin-bottom:16px}
.loading-text{color:var(--muted);font-family:'DM Mono',monospace;font-size:14px}
.empty-state{text-align:center;padding:48px 0;color:var(--muted);font-family:'DM Sans',sans-serif}
.empty-icon{font-size:48px;margin-bottom:16px}
.error-text{color:var(--red);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:16px}
.retry-btn{padding:6px 14px;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.footer-row{margin-top:40px;padding-top:40px;border-top:1px solid var(--border);text-align:center}
.ghost-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:12px 28px;border-radius:10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px}
.change-major-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Mono',monospace}
.major-header{display:flex;align-items:center;gap:12px;margin-bottom:32px;flex-wrap:wrap}
/* Quiz animated view */
.quiz-view{transition:opacity .3s ease,transform .3s ease}
.quiz-view.animating{opacity:0;transform:translateY(16px)}
/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){body{padding:24px 16px}.tool-card{padding:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <button class="logo-btn" onclick="showScreen('home')">
      <span class="logo-icon">🧭</span>
      <span class="logo-text">Career Compass</span>
    </button>
    <div class="nav-pills" id="navPills" style="display:none">
      <button class="nav-pill" id="navQuiz" onclick="showScreen('quiz')">🧭</button>
      <button class="nav-pill" id="navMajors" onclick="showScreen('majors')">🎓</button>
      <button class="nav-pill" id="navExplore" onclick="showScreen('explore')">🔍</button>
    </div>
  </div>

  <div id="screen-home"></div>
  <div id="screen-quiz" style="display:none"></div>
  <div id="screen-majors" style="display:none"></div>
  <div id="screen-explore" style="display:none"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const MAJOR_CATEGORIES = {
  "Business & Economics":["Accounting","Business Administration","Economics","Finance","Marketing","Management","Supply Chain Management","Entrepreneurship","International Business","Human Resources"],
  "STEM":["Computer Science","Data Science","Electrical Engineering","Mechanical Engineering","Civil Engineering","Chemical Engineering","Biology","Chemistry","Mathematics","Physics","Environmental Science","Biomedical Engineering","Software Engineering","Statistics"],
  "Health & Medicine":["Nursing","Pre-Medicine","Public Health","Kinesiology","Nutrition & Dietetics","Health Administration","Physical Therapy","Pharmacy","Occupational Therapy","Physician Assistant Studies"],
  "Social Sciences":["Psychology","Sociology","Political Science","Anthropology","International Relations","Criminal Justice","Social Work","Geography","Urban Studies","Gender Studies"],
  "Arts & Humanities":["English","History","Philosophy","Communications","Journalism","Fine Arts","Graphic Design","Film & Media Studies","Music","Theater","Architecture"],
  "Education":["Elementary Education","Secondary Education","Special Education","Early Childhood Education","Educational Leadership","Curriculum & Instruction"],
  "Law & Policy":["Pre-Law","Political Science","Public Policy","Criminal Justice","Legal Studies","Environmental Policy"],
  "Trades & Applied":["Construction Management","Information Technology","Cybersecurity","Network Administration","Culinary Arts","Hospitality Management"]
};

const CAREER_SUGGESTIONS = [
  "Software Engineer","Product Manager","Data Scientist","UX Designer","Marketing Manager",
  "Financial Analyst","Registered Nurse","Physical Therapist","Teacher","Social Worker",
  "Civil Engineer","Mechanical Engineer","Electrical Engineer","Architect","Urban Planner",
  "Lawyer","Paralegal","Accountant","Actuary","Investment Banker",
  "Journalist","Graphic Designer","Photographer","Film Director","Musician",
  "Doctor (Physician)","Pharmacist","Physician Assistant","Occupational Therapist","Dentist",
  "Entrepreneur","Venture Capitalist","Management Consultant","Business Analyst","Operations Manager",
  "Police Officer","Firefighter","Military Officer","FBI Agent","Border Patrol Agent",
  "Chef","Restaurant Manager","Hotel Manager","Event Planner","Travel Agent",
  "Electrician","Plumber","HVAC Technician","Carpenter","Welder",
  "Professor","School Counselor","Librarian","Education Administrator","Curriculum Developer",
  "Nonprofit Director","Foreign Service Officer","Peace Corps Volunteer","Policy Analyst","Lobbyist",
  "Cybersecurity Analyst","Network Engineer","DevOps Engineer","AI/ML Engineer","Cloud Architect"
];

const QUIZ_QUESTIONS = [
  {id:"workstyle_people",layer:"Work Style",color:"#93C5FD",q:"In a typical workday, how much time do you want to spend working directly with other people?",sub:"Be honest — this one shapes everything.",opts:[{v:"solo",l:"Mostly alone",i:"🧘",d:"Deep focus, minimal meetings"},{v:"mixed",l:"A healthy mix",i:"⚖️",d:"Some collaboration, some solo work"},{v:"people",l:"Mostly with others",i:"🤝",d:"People energy all day"}]},
  {id:"workstyle_desk",layer:"Work Style",color:"#93C5FD",q:"How many hours per day are you comfortable sitting at a computer?",sub:"Not what you can do — what you'd actually enjoy long-term.",opts:[{v:"low",l:"Less than 2 hours",i:"🌿",d:"I need to move around"},{v:"medium",l:"2–4 hours",i:"💻",d:"Some screen time is fine"},{v:"high",l:"4–6 hours",i:"🖥️",d:"Comfortable at a desk"},{v:"full",l:"Most of the day",i:"⌨️",d:"I actually enjoy deep computer work"}]},
  {id:"workstyle_handson",layer:"Work Style",color:"#93C5FD",q:"Which feels more like you?",sub:"There's no right answer — this is about self-knowledge.",opts:[{v:"handson",l:"Hands-on & physical",i:"🔧",d:"Building, fixing, making in the real world"},{v:"knowledge",l:"Knowledge & analysis",i:"📊",d:"Thinking, writing, strategizing"},{v:"both",l:"A real mix of both",i:"🔀",d:"I want variety"}]},
  {id:"workstyle_writing",layer:"Work Style",color:"#93C5FD",q:"How do you feel about writing as a core part of your job?",sub:"Reports, emails, proposals — would that energize or drain you?",opts:[{v:"love",l:"Love it",i:"✍️",d:"Writing is one of my strengths"},{v:"fine",l:"Fine in moderation",i:"📝",d:"Some writing is okay"},{v:"avoid",l:"Prefer to avoid it",i:"🙅",d:"Not my thing"}]},
  {id:"workstyle_numbers",layer:"Work Style",color:"#93C5FD",q:"How do you feel about data, spreadsheets, or math regularly?",sub:"Not whether you can do it — whether you want to.",opts:[{v:"love",l:"Enjoy it",i:"📈",d:"Numbers make sense to me"},{v:"fine",l:"Fine in moderation",i:"🔢",d:"A little is okay"},{v:"avoid",l:"Would rather not",i:"😅",d:"Keep the spreadsheets away"}]},
  {id:"practical_earnings",layer:"Money & Lifestyle",color:"#FCD34D",q:"What income level are you aiming for?",sub:"This is a real filter — some paths simply can't get you there.",opts:[{v:"high",l:"$200k+ / year",i:"💰",d:"Finance, law, medicine, tech"},{v:"comfortable",l:"$60k–$150k / year",i:"🏠",d:"Comfortable, stable income"},{v:"mission",l:"Below market is okay",i:"🌱",d:"I'd trade pay for meaning"}]},
  {id:"practical_intensity",layer:"Money & Lifestyle",color:"#FCD34D",q:"How hard do you want to work?",sub:"Ambition is great — but knowing yourself is smarter.",opts:[{v:"intense",l:"60+ hours — build something big",i:"🚀",d:"High intensity, high reward"},{v:"standard",l:"40–45 hours — standard",i:"⏰",d:"Solid career, room for life"},{v:"balanced",l:"Work-life balance is a priority",i:"🌅",d:"I want a full life outside work"}]},
  {id:"practical_mobility",layer:"Money & Lifestyle",color:"#FCD34D",q:"How important is geographic flexibility?",sub:"Some careers take you anywhere. Others chain you to one city.",opts:[{v:"high",l:"Very important — live anywhere",i:"🗺️",d:"Max portability"},{v:"medium",l:"A few major cities is fine",i:"🏙️",d:"Flexibility within reason"},{v:"low",l:"Not important — happy to plant roots",i:"🌳",d:"Stability over mobility"}]},
  {id:"career_impact",layer:"Career Shape",color:"#FCA5A5",q:"Which kind of impact feels most meaningful?",sub:"Think about what would make you feel proud at end of day.",opts:[{v:"direct",l:"Helping specific people directly",i:"❤️",d:"See my impact on individuals"},{v:"systemic",l:"Driving systemic change",i:"🌍",d:"Big picture, policy, scale"},{v:"building",l:"Building things",i:"🏗️",d:"Products, companies, tools"},{v:"wealth",l:"Creating financial value",i:"📊",d:"Markets, deals, growth"}]},
  {id:"career_orgtype",layer:"Career Shape",color:"#FCA5A5",q:"What kind of organization do you picture yourself in?",sub:"This shapes your daily culture more than most people expect.",opts:[{v:"startup",l:"Startup or small company",i:"⚡",d:"Fast, scrappy, wear many hats"},{v:"midsize",l:"Mid-size company",i:"🏢",d:"Structure with room to grow"},{v:"enterprise",l:"Large corporation",i:"🌐",d:"Resources, stability, clear ladder"},{v:"mission",l:"Nonprofit / government / social enterprise",i:"🤲",d:"Mission-first"}]},
  {id:"career_management",layer:"Career Shape",color:"#FCA5A5",q:"Long-term, what kind of role do you want?",sub:"Neither is better — they lead to very different paths.",opts:[{v:"manager",l:"Lead & manage people",i:"👥",d:"Build teams, set direction"},{v:"specialist",l:"Deep individual expertise",i:"🎯",d:"Become the expert"},{v:"founder",l:"Start my own thing",i:"🏗️",d:"Entrepreneurship or freelance"},{v:"either",l:"Open to any of these",i:"🔭",d:"I'll figure it out"}]},
  {id:"ai_relationship",layer:"Future of Work",color:"#C4B5FD",q:"How do you feel about AI significantly changing your field?",sub:"This isn't about fear — it's about fit.",opts:[{v:"resistant",l:"I want strong AI resistance",i:"🛡️",d:"Trades, hands-on care"},{v:"alongside",l:"Work with AI as a tool",i:"🤖",d:"Amplify my skills"},{v:"inside",l:"Work inside AI/tech itself",i:"⚡",d:"Build the future"},{v:"unsure",l:"Not sure yet",i:"🤷",d:"Help me think about it"}]}
];

// ── API ───────────────────────────────────────────────────────────────────────
async function callAPI(prompt, maxTokens=600) {
  const res = await fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:maxTokens, messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok) throw new Error('HTTP error ' + res.status);
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || 'API error');
  if(!data.content) throw new Error('No content in response');
  const text = data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
  console.log('API response text:', text.slice(0, 300));
  // Try array first, then object
  const arrMatch = text.match(/\[[\s\S]*\]/);
  const objMatch = text.match(/\{[\s\S]*\}/);
  // For array responses try array first
  if(arrMatch) { try { return JSON.parse(arrMatch[0]); } catch(e) {} }
  if(objMatch) { try { return JSON.parse(objMatch[0]); } catch(e) {} }
  // Last resort: try parsing the whole text
  try { return JSON.parse(text); } catch(e) {}
  throw new Error('Could not parse JSON from: ' + text.slice(0,100));
}

function careerDetailPrompt(title, context='') {
  return `Generate a detailed career profile for: ${title}${context?` (for a ${context})`:''}.
Respond ONLY with valid JSON, no markdown:
{"title":"${title}","emoji":"one emoji","description":"2 sentences on what this career is","earnings":"avg salary range e.g. $65k–$120k","ai_risk":"low|medium|high","ai_note":"1 sentence","mobility":"1-2 sentences on geographic flexibility","org_types":["type1","type2","type3"],"daily_reality":"1-2 sentences on a real workday","stats":{"computer":3,"people":4,"writing":2,"math":3},"courses":["Course — reason","Course — reason","Course — reason"]}
Stats use 1-5 scale: 1=very low, 5=very high.`;
}

function renderSearchDropdown(val) {
  const dd = document.getElementById('searchDropdown');
  if(!val||val.length<1){dd.style.display='none';return;}
  const results = CAREER_SUGGESTIONS.filter(c=>c.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  if(!results.length){dd.style.display='none';return;}
  dd.innerHTML=results.map(r=>`<button class="search-dd-item" onclick="addCareer('${r.replace(/'/g,"\\'")}')"><span>${r}</span><span class="dd-add">+ add</span></button>`).join('');
  dd.style.display='block';
}

async function addCareer(title) {
  const dd = document.getElementById('searchDropdown');
  if(dd) dd.style.display='none';
  const inp = document.getElementById('exploreSearch');
  if(inp) inp.value='';
  if(exploreState.careers.find(c=>c.title===title)||exploreState.careers.length>=3) return;
  exploreState.loading=title;
  renderExplore();
  try {
    const data = await callAPI(careerDetailPrompt(title),600);
    exploreState.careers.push({...data,title,emoji:data.emoji||'💼'});
  } catch {
    alert('Failed to load ' + title + '. Please try again.');
  }
  exploreState.loading=null;
  renderExplore();
}

function removeCareer(title) {
  exploreState.careers=exploreState.careers.filter(c=>c.title!==title);
  renderExplore();
}

function setViewMode(mode) { exploreState.viewMode=mode; renderExplore(); }

let quizState = {step:0,answers:{},phase:'quiz',summary:'',careerTitles:[],careers:[null,null,null],loadingCards:[true,true,true],cardErrors:[false,false,false],planSummary:''};

function initQuiz() {
  quizState={step:0,answers:{},phase:'quiz',summary:'',careerTitles:[],careers:[null,null,null],loadingCards:[true,true,true],cardErrors:[false,false,false],planSummary:''};

function renderQuiz() {
  const el = document.getElementById('screen-quiz');
  if(quizState.phase==='loading') {
    el.innerHTML=`<button class="back-btn" onclick="showScreen('home')">← back</button>
      <div class="loading-center"><div class="loading-icon">🧭</div><p class="loading-text">Building your profile...</p></div>`;
    return;
  }
  if(quizState.phase==='error') {
    el.innerHTML=`<button class="back-btn" onclick="showScreen('home')">← back</button>
      <div style="text-align:center;padding:40px"><p class="error-text">Something went wrong.</p><button class="ghost-btn" onclick="fetchQuizResults()">Try Again</button></div>`;
    return;
  }
  if(quizState.phase==='results') { renderQuizResults(); return; }
  const q=QUIZ_QUESTIONS[quizState.step];
  const pct=Math.round((quizState.step/QUIZ_QUESTIONS.length)*100);
  const opts=q.opts.map(o=>`<button class="opt-btn"
    onmouseover="this.style.borderColor='${q.color}99';this.style.background='${q.color}0f'"
    onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface)'"
    onclick="quizAnswer('${o.v}')">
    <span class="opt-icon">${o.i}</span>
    <div><div class="opt-label">${o.l}</div><div class="opt-desc">${o.d}</div></div>
  </button>`).join('');
  el.innerHTML=`
    <button class="back-btn" onclick="showScreen('home')">← back</button>
    <div class="progress-wrap">
      <div class="progress-labels"><span>Question ${quizState.step+1} of ${QUIZ_QUESTIONS.length}</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-view" id="quizView">
      <div class="quiz-layer-tag"><span class="tag" style="color:${q.color};background:${q.color}22">${q.layer}</span></div>
      <h2 class="quiz-q">${q.q}</h2>
      <p class="quiz-sub">${q.sub}</p>
      <div class="options">${opts}</div>
      <div class="quiz-nav">
        ${quizState.step>0?'<button class="quiz-nav-btn" onclick="quizBack()">← go back</button>':'<span></span>'}
        <button class="quiz-nav-btn" onclick="quizSkip()">skip →</button>
      </div>
    </div>`;
}

function quizAnimate(fn) {
  const v=document.getElementById('quizView');
  if(v){v.classList.add('animating');setTimeout(()=>{fn();},300);}
  else fn();
}

function quizAnswer(val) {
  quizState.answers[QUIZ_QUESTIONS[quizState.step].id]=val;
  quizAnimate(()=>{
    quizState.step++;
    if(quizState.step>=QUIZ_QUESTIONS.length) fetchQuizResults();
    else renderQuiz();
  });
}

function quizSkip() { quizAnimate(()=>{ quizState.step++; if(quizState.step>=QUIZ_QUESTIONS.length) fetchQuizResults(); else renderQuiz(); }); }
function quizBack() { quizAnimate(()=>{ quizState.step--; renderQuiz(); }); }

async function fetchQuizResults() {
  quizState.phase='loading'; renderQuiz();
  const answerSummary = QUIZ_QUESTIONS.map(q=>{ const opt=q.opts.find(o=>o.v===quizState.answers[q.id]); return `${q.q} → ${opt?opt.l:'skipped'}`; }).join('\n');
  try {
    const plan = await callAPI(`You are a career counselor for an 18-year-old college freshman.
Based on these answers, write a 2-sentence profile summary and pick exactly 3 fitting career titles.
Rules: if hands-on/AI-resistant include one skilled trade; if mission org include nonprofit/gov option.
ANSWERS:\n${answerSummary}
Respond ONLY with valid JSON: {"summary":"2 sentences","careers":["Title 1","Title 2","Title 3"]}`,300);
    quizState.planSummary=plan.summary;
    quizState.summary=plan.summary;
    quizState.careerTitles=plan.careers;
    quizState.phase='results';
    renderQuizResults();
    plan.careers.forEach(async(title,i)=>{
      for(let attempt=1;attempt<=2;attempt++){
        try{
          const data=await callAPI(careerDetailPrompt(title,'college freshman')+`\nAlso include in JSON: "why_it_fits":"2 sentences specific to: ${plan.summary}", "path":"1 sentence on getting started"`,650);
          quizState.careers[i]=data; quizState.loadingCards[i]=false;
          updateQuizCard(i,title,data); break;
        }catch{ if(attempt===2){quizState.cardErrors[i]=true;quizState.loadingCards[i]=false;showQuizCardError(i,title);} }
      }
    });
  } catch { quizState.phase='error'; renderQuiz(); }
}

function renderQuizResults() {
  const el=document.getElementById('screen-quiz');
  const skels=quizState.careerTitles.map((t,i)=>skeletonHTML(t,'qz'+i)).join('');
  el.innerHTML=`
    <button class="back-btn" onclick="showScreen('home')">← back</button>
    <h2 style="font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);color:var(--text);margin-bottom:16px">Your Career Profile</h2>
    <p class="results-summary">${quizState.summary}</p>
    <div class="results-section-label">Career Matches</div>
    <div class="career-cards">${skels}</div>
    <div class="footer-row"><button class="ghost-btn" onclick="initQuiz()">← retake quiz</button></div>`;
  // If careers already loaded (retry scenario), render them
  quizState.careerTitles.forEach((title,i)=>{ if(quizState.careers[i]) updateQuizCard(i,title,quizState.careers[i]); });
}

function updateQuizCard(i,title,data) {
  const el=document.getElementById('ccard-qz'+i);
  if(!el) return;
  el.outerHTML=careerCardHTML({...data,title},'qz'+i,false);
  setTimeout(()=>{const c=document.getElementById('ccard-qz'+i);if(c)c.classList.add('visible');},50);
}

function showQuizCardError(i,title) {
  const el=document.getElementById('ccard-qz'+i);
  if(!el) return;
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--text)">${title}</span><button class="retry-btn" onclick="retryQuizCard(${i},'${title.replace(/'/g,"\\'")}')">retry →</button></div>`;
}

async function retryQuizCard(i,title) {
  const el=document.getElementById('ccard-qz'+i);
  if(el){el.className='skel-card';el.innerHTML=skeletonHTML(title,'qz'+i);}
  quizState.cardErrors[i]=false;
  try {
    const data=await callAPI(careerDetailPrompt(title,'college freshman'),650);
    quizState.careers[i]=data; updateQuizCard(i,title,data);
  } catch { showQuizCardError(i,title); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
// Dropdown handled per-screen
</script>
</body>
